name: Valgrind

# Valgrind memcheck lite soak (60s @ 4 conc) on every PR/push — cheap dynamic
# gate kept short so PR feedback stays quick. The full 600s memcheck + helgrind
# soaks live in ci-deep.yml (monthly cron + workflow_dispatch).
#
# Action pins (keep in sync with build-test.yml header):
# actions/checkout@v5        -> 93cb6efe18208431cddfb8368fd83d5badbf9bfd

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: "1.31.1"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: valgrind-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  memcheck-lite:
    name: Memcheck lite (60s soak)
    runs-on: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && fromJSON('["self-hosted","builder02","lxc"]') || 'ubuntu-24.04' }}
    timeout-minutes: 45
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl libpcre2-dev libssl-dev pkg-config \
            valgrind zlib1g-dev

      - name: Build debug nginx + cache-turbo module
        run: bash ci/tools/ci-build.sh nginx "$NGINX_VERSION" debug

      - name: Memcheck soak (60s @ 4 conc, WITH suppressions)
        env:
          USE_VALGRIND: "1"
        run: |
          B="$GITHUB_WORKSPACE/.build/nginx-${NGINX_VERSION}/objs"
          MODULE="$B/ngx_http_cache_turbo_module.so" \
            bash ci/tools/soak.sh "$B/nginx" 60 4
