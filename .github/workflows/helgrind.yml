name: Helgrind

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: "1.31.1"

on:
  schedule:
    # Monthly, 1st @ 03:30 UTC.
    - cron: "30 4 1 * *"
  workflow_dispatch: {}

concurrency:
  group: helgrind-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  memcheck:
    name: Helgrind
    runs-on: [self-hosted, builder02, lxc]
    # Long monthly memcheck soak on self-hosted — no GitHub 6h cap.
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl libpcre2-dev libssl-dev memcached \
            redis-server valgrind zlib1g-dev

      - name: Build debug server and module
        run: bash tools/ci-build.sh nginx "$NGINX_VERSION" debug

      - name: Run runtime suite under Helgrind
        run: |
          runner="valgrind --tool=helgrind --error-exitcode=99"
          runner="$runner --suppressions=$GITHUB_WORKSPACE/tools/valgrind.supp"
          runner="$runner --log-file=$GITHUB_WORKSPACE/helgrind-%p.log"
          python3 tools/test_runtime.py \
            --single-process \
            --runner "$runner" \
            --redis-server /usr/bin/redis-server \
            --memcached-server /usr/bin/memcached \
            --nginx-binary "$GITHUB_WORKSPACE/.build/nginx-${NGINX_VERSION}/objs/nginx" \
            --module "$GITHUB_WORKSPACE/.build/nginx-${NGINX_VERSION}/objs/ngx_http_cache_turbo_module.so"

      - name: Verify Helgrind reports
        if: always()
        run: |
          cat helgrind-*.log || true
          if grep -Eq 'ERROR SUMMARY: [1-9][0-9]* errors' helgrind-*.log; then
            exit 1
          fi
          grep -Eq 'ERROR SUMMARY: 0 errors' helgrind-*.log

      - name: Upload Helgrind reports
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: helgrind-reports
          path: helgrind-*.log
          retention-days: 14

      - name: Notify Discord on failure
        if: failure() && github.event_name == 'schedule'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_BUILDS: ${{ secrets.DISCORD_CHANNEL_BUILDS }}
        run: |
          [ -n "$DISCORD_BOT_TOKEN" ] || exit 0
          curl -fsS -X POST \
            -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_BUILDS/messages" \
            -d "{\"content\":\"🔴 ${{ github.repository }} — ${{ github.workflow }} FAILED (scheduled). ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true
