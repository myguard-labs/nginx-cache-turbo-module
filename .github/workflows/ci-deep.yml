name: CI Deep

# Exhaustive dynamic analysis — monthly cron + on-demand only, NEVER on PR.
# The fast PR/push gates live in the standalone fuzzing.yml (fuzz regression),
# valgrind.yml (memcheck lite) and security-scanners.yml (scanners) workflows;
# THIS file keeps the long/exhaustive runs. CodeQL remains in codeql.yml; this
# workflow complements it with long dynamic-analysis and scanner jobs.
#
# Jobs: fuzz (up to 14400s/target × 4) · memcheck soak · helgrind soak · scanners.
#   * memcheck AND helgrind run under tools/soak.sh, which passes
#     --suppressions=tools/valgrind.supp for BOTH, and --error-exitcode=99 for
#     helgrind — the drift-fix baseline for every module.
#   * cache-turbo is a memory-heavy module (shm slab + LRU + SWR + L2 clients),
#     so both soaks run 600s (longer than the 300s baseline) to churn eviction.
#
# Action pins (keep in sync with build-test.yml header):
# actions/checkout@v5        -> 93cb6efe18208431cddfb8368fd83d5badbf9bfd
# actions/upload-artifact@v5 -> 330a01c490aca151604b8cf639adc76d48f6c5d4

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: "1.31.1"

on:
  schedule:
    # Monthly, day 5 @ 03:30 UTC — staggered per repo so ci-deep runs
    # don't pile up on the shared self-hosted runners.
    - cron: "30 3 5 * *"
  workflow_dispatch:
    inputs:
      fuzz_seconds:
        description: "Per-target fuzz duration (seconds)"
        required: false
        type: number
        default: 3600

concurrency:
  group: ci-deep-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz (all targets, long)
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 600
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          submodules: true

      - name: Install clang + libFuzzer
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Select fuzz duration
        env:
          FUZZ_SECONDS_INPUT: ${{ inputs.fuzz_seconds || '3600' }}
        run: |
          case "$FUZZ_SECONDS_INPUT" in
            ''|*[!0-9]*)
              echo "::error::fuzz_seconds must contain decimal digits only"
              exit 2
              ;;
          esac
          if [ "$FUZZ_SECONDS_INPUT" -lt 1 ] \
              || [ "$FUZZ_SECONDS_INPUT" -gt 14400 ]; then
            echo "::error::fuzz_seconds must be between 1 and 14400"
            exit 2
          fi
          printf 'FUZZ_SECS=%s\n' "$FUZZ_SECONDS_INPUT" >> "$GITHUB_ENV"

      - name: Build fuzz targets
        run: bash fuzz/build.sh "$GITHUB_WORKSPACE/fuzz"

      - name: Fuzz each target
        run: |
          set -euo pipefail
          cd fuzz
          # target:corpus:dict — each target gets the full per-target budget.
          targets="fuzz_resp_parser:corpus:fuzz.dict \
                   fuzz_norm_args:corpus_norm_args: \
                   fuzz_mc_parser:corpus_mc:fuzz_mc.dict \
                   fuzz_auto_classify:corpus_auto:"
          for t in $targets; do
            bin="${t%%:*}"; rest="${t#*:}"; corp="${rest%%:*}"; dict="${rest#*:}"
            echo "=== $bin over $corp (${FUZZ_SECS}s)${dict:+ dict=$dict} ==="
            args="-max_total_time=$FUZZ_SECS -print_final_stats=1 -artifact_prefix=crash-${bin}-"
            [ -n "$dict" ] && args="$args -dict=$dict"
            set +e
            # shellcheck disable=SC2086
            "./$bin" $args "$corp/"
            rc=$?
            set -e
            [ $rc -eq 0 ] || { echo "❌ $bin crash (exit $rc)"; exit 1; }
            echo "✓ $bin: no crashes in ${FUZZ_SECS}s"
            mkdir -p "${corp}-min"
            "./$bin" -merge=1 "${corp}-min/" "$corp/"
            echo "merged $corp: $(find "${corp}-min" -type f | wc -l) units"
          done

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-deep-crashes
          path: ${{ github.workspace }}/fuzz/crash-*
          retention-days: 30

      - name: Upload minimized corpus
        if: success()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-corpus
          path: ${{ github.workspace }}/fuzz/*-min
          retention-days: 30

      - name: Notify Discord on failure
        if: failure() && github.event_name == 'schedule'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_BUILDS: ${{ secrets.DISCORD_CHANNEL_BUILDS }}
        run: |
          [ -n "$DISCORD_BOT_TOKEN" ] || exit 0
          curl -fsS -X POST -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_BUILDS/messages" \
            -d "{\"content\":\"🔴 ${{ github.repository }} — CI Deep / fuzz FAILED. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true

  memcheck:
    name: Valgrind Memcheck soak
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 240
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          submodules: true
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl libpcre2-dev libssl-dev pkg-config \
            valgrind zlib1g-dev
      - name: Build debug nginx + cache-turbo module
        run: bash tools/ci-build.sh nginx "$NGINX_VERSION" debug
      - name: Memcheck soak (600s @ 4 conc, WITH suppressions)
        env:
          USE_VALGRIND: "1"
        run: |
          B="$GITHUB_WORKSPACE/.build/nginx-${NGINX_VERSION}/objs"
          MODULE="$B/ngx_http_cache_turbo_module.so" \
            bash tools/soak.sh "$B/nginx" 600 4
      - name: Notify Discord on failure
        if: failure() && github.event_name == 'schedule'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_BUILDS: ${{ secrets.DISCORD_CHANNEL_BUILDS }}
        run: |
          [ -n "$DISCORD_BOT_TOKEN" ] || exit 0
          curl -fsS -X POST -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_BUILDS/messages" \
            -d "{\"content\":\"🔴 ${{ github.repository }} — CI Deep / memcheck FAILED. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true

  helgrind:
    name: Valgrind Helgrind soak
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 240
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          submodules: true
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl libpcre2-dev libssl-dev pkg-config \
            valgrind zlib1g-dev
      - name: Build debug nginx + cache-turbo module
        run: bash tools/ci-build.sh nginx "$NGINX_VERSION" debug
      - name: Helgrind soak (600s @ 4 conc, --error-exitcode=99, WITH suppressions)
        env:
          USE_HELGRIND: "1"
        run: |
          B="$GITHUB_WORKSPACE/.build/nginx-${NGINX_VERSION}/objs"
          MODULE="$B/ngx_http_cache_turbo_module.so" \
            bash tools/soak.sh "$B/nginx" 600 4
      - name: Notify Discord on failure
        if: failure() && github.event_name == 'schedule'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_BUILDS: ${{ secrets.DISCORD_CHANNEL_BUILDS }}
        run: |
          [ -n "$DISCORD_BOT_TOKEN" ] || exit 0
          curl -fsS -X POST -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_BUILDS/messages" \
            -d "{\"content\":\"🔴 ${{ github.repository }} — CI Deep / helgrind FAILED. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true

  scanners:
    name: Security scanners
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 20
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          submodules: true
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl flawfinder clang-tidy \
            libpcre2-dev libssl-dev python3 python3-pip pipx zlib1g-dev
          # semgrep: isolate via pipx (PEP 668 blocks a bare pip3 install into the
          # system Python on the Ubuntu 24.04 self-hosted runner). Fall back to a
          # user pip install with --break-system-packages if pipx is unavailable.
          if command -v pipx >/dev/null; then
            pipx install --quiet semgrep
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          else
            pip3 install --quiet --user --break-system-packages semgrep
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi
      - name: Configure nginx src tree (clang-tidy headers)
        run: |
          set -euo pipefail
          bash tools/ci-build.sh nginx "$NGINX_VERSION" module
          echo "NGINX_SRC_TREE=$GITHUB_WORKSPACE/.build/nginx-${NGINX_VERSION}" \
            >> "$GITHUB_ENV"
      - name: flawfinder
        run: |
          # minlevel=3: level 1-2 is dominated by token-matches on the struct
          # field op->recv (not the recv(2) syscall) and on FF1029 sites that
          # contain no loop. 34 such alerts were dismissed as false positives.
          flawfinder --minlevel=3 "$GITHUB_WORKSPACE"/src/*.c 2>&1 | tee flawfinder.log
      - name: clang-tidy (cert-*, security.*)
        run: |
          set -euo pipefail
          N="$NGINX_SRC_TREE"
          INCLUDES="-I$N/src/core -I$N/src/event -I$N/src/event/modules -I$N/src/event/quic \
            -I$N/src/os/unix -I$N/objs -I$N/src/http -I$N/src/http/modules -I$N/src/http/v2 -I/usr/include"
          status=0
          for f in "$GITHUB_WORKSPACE"/src/*.c; do
            # shellcheck disable=SC2086
            clang-tidy "$f" \
              --checks='-*,cert-*,clang-analyzer-security.*,-clang-analyzer-security.insecureAPI.DeprecatedOrUnsafeBufferHandling' \
              --warnings-as-errors='*' \
              -- $INCLUDES 2>&1 | tee -a clang-tidy.log || status=1
          done
          exit "$status"
      - name: semgrep
        run: |
          semgrep scan --config p/c --config p/security-audit \
            "$GITHUB_WORKSPACE/src/" 2>&1 | tee semgrep.log || true
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: security-reports
          path: |
            ${{ github.workspace }}/flawfinder.log
            ${{ github.workspace }}/clang-tidy.log
            ${{ github.workspace }}/semgrep.log
          retention-days: 14
