name: CI Deep

# Exhaustive dynamic analysis — monthly cron + on-demand only, NEVER on PR.
# The fast PR/push gates live in the standalone fuzzing.yml (fuzz regression),
# valgrind.yml (memcheck lite) and security-scanners.yml (scanners) workflows;
# THIS file keeps the long/exhaustive runs. CodeQL remains in codeql.yml; this
# workflow complements it with long dynamic-analysis and scanner jobs.
#
# Jobs: fuzz (up to 14400s/target × 4) · legacy-runtime (pre-1.23 ABI) ·
#       clang-analyze (full-source path-flow) · memcheck soak · helgrind soak ·
#       asan-soak (ASan multi-worker fault-injection ×N — flake repetition) ·
#       scanners.
#   * memcheck AND helgrind run under ci/tools/soak.sh, which passes
#     --suppressions=ci/tools/valgrind.supp for BOTH, and --error-exitcode=99 for
#     helgrind — the drift-fix baseline for every module.
#   * cache-turbo is a memory-heavy module (shm slab + LRU + SWR + L2 clients),
#     so both soaks run 600s (longer than the 300s baseline) to churn eviction.
#
# Action pins (keep in sync with build-test.yml header):
# actions/checkout@v5        -> 93cb6efe18208431cddfb8368fd83d5badbf9bfd
# actions/upload-artifact@v5 -> 330a01c490aca151604b8cf639adc76d48f6c5d4

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: "1.31.1"

on:
  schedule:
    # Monthly, day 5 @ 03:30 UTC — staggered per repo so ci-deep runs
    # don't pile up on the shared self-hosted runners.
    - cron: "30 3 5 * *"
  workflow_dispatch:
    inputs:
      fuzz_seconds:
        description: "Per-target fuzz duration (seconds)"
        required: false
        type: number
        default: 3600
      soak_iterations:
        description: "asan-soak: runtime-suite repetitions (flake hunt)"
        required: false
        type: number
        default: 8

concurrency:
  group: ci-deep-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz:
    name: Fuzz (all targets, long)
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 600
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install clang + libFuzzer
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Select fuzz duration
        env:
          FUZZ_SECONDS_INPUT: ${{ inputs.fuzz_seconds || '3600' }}
        run: |
          case "$FUZZ_SECONDS_INPUT" in
            ''|*[!0-9]*)
              echo "::error::fuzz_seconds must contain decimal digits only"
              exit 2
              ;;
          esac
          if [ "$FUZZ_SECONDS_INPUT" -lt 1 ] \
              || [ "$FUZZ_SECONDS_INPUT" -gt 14400 ]; then
            echo "::error::fuzz_seconds must be between 1 and 14400"
            exit 2
          fi
          printf 'FUZZ_SECS=%s\n' "$FUZZ_SECONDS_INPUT" >> "$GITHUB_ENV"

      - name: Build fuzz targets
        run: bash ci/fuzz/build.sh "$GITHUB_WORKSPACE/ci/fuzz"

      - name: Fuzz each target
        run: |
          set -euo pipefail
          cd ci/fuzz
          # target:corpus:dict — each target gets the full per-target budget.
          targets="fuzz_resp_parser:corpus:fuzz.dict \
                   fuzz_norm_args:corpus_norm_args: \
                   fuzz_mc_parser:corpus_mc:fuzz_mc.dict \
                   fuzz_auto_classify:corpus_auto:"
          for t in $targets; do
            bin="${t%%:*}"; rest="${t#*:}"; corp="${rest%%:*}"; dict="${rest#*:}"
            echo "=== $bin over $corp (${FUZZ_SECS}s)${dict:+ dict=$dict} ==="
            args="-max_total_time=$FUZZ_SECS -print_final_stats=1 -artifact_prefix=crash-${bin}-"
            [ -n "$dict" ] && args="$args -dict=$dict"
            set +e
            # shellcheck disable=SC2086
            "./$bin" $args "$corp/"
            rc=$?
            set -e
            [ $rc -eq 0 ] || { echo "❌ $bin crash (exit $rc)"; exit 1; }
            echo "✓ $bin: no crashes in ${FUZZ_SECS}s"
            mkdir -p "${corp}-min"
            "./$bin" -merge=1 "${corp}-min/" "$corp/"
            echo "merged $corp: $(find "${corp}-min" -type f | wc -l) units"
          done

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-deep-crashes
          path: ${{ github.workspace }}/ci/fuzz/crash-*
          retention-days: 30

      - name: Upload minimized corpus
        if: success()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-corpus
          path: ${{ github.workspace }}/ci/fuzz/*-min
          retention-days: 30

      - name: Notify Discord on failure
        if: failure() && github.event_name == 'schedule'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_BUILDS: ${{ secrets.DISCORD_CHANNEL_BUILDS }}
        run: |
          [ -n "$DISCORD_BOT_TOKEN" ] || exit 0
          curl -fsS -X POST -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_BUILDS/messages" \
            -d "{\"content\":\"🔴 ${{ github.repository }} — CI Deep / fuzz FAILED. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true

  legacy-runtime:
    # Pre-1.23 nginx exposes multi-value request headers as the
    # r->headers_in.cookies ARRAY (ngx_array_t of ngx_table_elt_t*), not the
    # 1.23+ r->headers_in.cookie linked list. The module carries a separate
    # #else code path for that ABI (key-cookie lookup, preset key-cookie fold,
    # cache_turbo_key_cookie lookup). The mainline 1.31.1 jobs build ONLY the
    # 1.23+ branch, so without this job the pre-1.23 branch has ZERO coverage of
    # any kind (no compile job either) — a break there would ship silently.
    # 1.22.1 is the last pre-1.23 stable release. This builds it and runs the
    # full runtime suite, so the preset/DIY key-cookie tests execute the ARRAY
    # branch at runtime, not just compile it. Moved here from build-test.yml
    # 2026-07-21: the ABI branch changes rarely, so nightly coverage is enough
    # and it no longer sits on the per-PR critical path.
    name: Legacy nginx (pre-1.23) runtime
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 20
    env:
      LEGACY_NGINX_VERSION: "1.22.1"
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install build and runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache curl eatmydata libpcre2-dev libssl-dev mold redis-server memcached zlib1g-dev

      - name: Build module against legacy nginx
        run: bash ci/tools/ci-build.sh nginx "$LEGACY_NGINX_VERSION" debug

      - name: Sweep stale test listeners
        run: |
          command -v fuser >/dev/null || sudo apt-get install -y psmisc
          for p in $(seq 18870 18999); do
            fuser -k -TERM "${p}/tcp" 2>/dev/null || true
          done
          sleep 1

      - name: Run runtime suite against legacy nginx
        run: |
          B="$GITHUB_WORKSPACE/.build/nginx-${LEGACY_NGINX_VERSION}/objs"
          python3 ci/tools/test_runtime.py \
            --fault-injection \
            --nginx-binary "$B/nginx" \
            --module "$B/ngx_http_cache_turbo_module.so" \
            --redis-server /usr/bin/redis-server \
            --memcached-server /usr/bin/memcached

      - name: Notify Discord on failure
        if: failure() && github.event_name == 'schedule'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_BUILDS: ${{ secrets.DISCORD_CHANNEL_BUILDS }}
        run: |
          [ -n "$DISCORD_BOT_TOKEN" ] || exit 0
          curl -fsS -X POST -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_BUILDS/messages" \
            -d "{\"content\":\"🔴 ${{ github.repository }} — CI Deep / legacy-runtime FAILED. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true

  clang-analyze:
    # Clang path-flow static analyzer (null-deref, leaks, uninit reads, dead
    # stores) over all six sources with the configured nginx include set. Any
    # report fails the job. Moved here from build-test.yml 2026-07-21: it is
    # deterministic, and security-scanners' clang-tidy clang-analyzer-security.*
    # pass already covers per-PR clang static analysis — so this deeper full-source
    # pass runs nightly rather than duplicating clang work on every PR.
    name: Clang static analyzer
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 30
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache clang curl eatmydata libpcre2-dev libssl-dev mold zlib1g-dev

      - name: Clang --analyze every source
        run: |
          bash ci/tools/ci-build.sh nginx "$NGINX_VERSION" module
          build=".build/nginx-${NGINX_VERSION}"
          incs=$(awk '/^ALL_INCS[[:space:]]*=/{found=1} found{line=$0; sub(/^ALL_INCS[[:space:]]*=[[:space:]]*/,"",line); continued=(line ~ /\\$/); gsub(/\\$/, "", line); printf "%s ", line; if (!continued) exit}' "$build/objs/Makefile")
          rc=0
          for src in ngx_http_cache_turbo_module ngx_http_cache_turbo_shm ngx_http_cache_turbo_swr ngx_http_cache_turbo_autotune ngx_http_cache_turbo_redis ngx_http_cache_turbo_memcached; do
            # incs is a flag list and must word-split.
            # shellcheck disable=SC2086
            ( cd "$build" && clang --analyze -Xanalyzer -analyzer-output=text \
                -DNGX_DEBUG_PALLOC=1 $incs \
                "$GITHUB_WORKSPACE/src/${src}.c" 2>"/tmp/analyze-${src}.log" ) || rc=1
            if [ -s "/tmp/analyze-${src}.log" ]; then
              echo "::error file=src/${src}.c::clang analyzer reported issues"
              cat "/tmp/analyze-${src}.log"
              rc=1
            fi
          done
          rm -f "$build"/*.plist
          exit "$rc"

      - name: Notify Discord on failure
        if: failure() && github.event_name == 'schedule'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_BUILDS: ${{ secrets.DISCORD_CHANNEL_BUILDS }}
        run: |
          [ -n "$DISCORD_BOT_TOKEN" ] || exit 0
          curl -fsS -X POST -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_BUILDS/messages" \
            -d "{\"content\":\"🔴 ${{ github.repository }} — CI Deep / clang-analyze FAILED. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true

  memcheck:
    name: Valgrind Memcheck soak
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 240
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache curl eatmydata libpcre2-dev libssl-dev mold pkg-config \
            valgrind zlib1g-dev
      - name: Build debug nginx + cache-turbo module
        run: bash ci/tools/ci-build.sh nginx "$NGINX_VERSION" debug
      - name: Memcheck soak (600s @ 4 conc, WITH suppressions)
        env:
          USE_VALGRIND: "1"
        run: |
          B="$GITHUB_WORKSPACE/.build/nginx-${NGINX_VERSION}/objs"
          MODULE="$B/ngx_http_cache_turbo_module.so" \
            bash ci/tools/soak.sh "$B/nginx" 600 4
      - name: Notify Discord on failure
        if: failure() && github.event_name == 'schedule'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_BUILDS: ${{ secrets.DISCORD_CHANNEL_BUILDS }}
        run: |
          [ -n "$DISCORD_BOT_TOKEN" ] || exit 0
          curl -fsS -X POST -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_BUILDS/messages" \
            -d "{\"content\":\"🔴 ${{ github.repository }} — CI Deep / memcheck FAILED. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true

  helgrind:
    name: Valgrind Helgrind soak
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 240
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential ccache curl eatmydata libpcre2-dev libssl-dev mold pkg-config \
            valgrind zlib1g-dev
      - name: Build debug nginx + cache-turbo module
        run: bash ci/tools/ci-build.sh nginx "$NGINX_VERSION" debug
      - name: Helgrind soak (600s @ 4 conc, --error-exitcode=99, WITH suppressions)
        env:
          USE_HELGRIND: "1"
        run: |
          B="$GITHUB_WORKSPACE/.build/nginx-${NGINX_VERSION}/objs"
          MODULE="$B/ngx_http_cache_turbo_module.so" \
            bash ci/tools/soak.sh "$B/nginx" 600 4
      - name: Notify Discord on failure
        if: failure() && github.event_name == 'schedule'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_BUILDS: ${{ secrets.DISCORD_CHANNEL_BUILDS }}
        run: |
          [ -n "$DISCORD_BOT_TOKEN" ] || exit 0
          curl -fsS -X POST -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_BUILDS/messages" \
            -d "{\"content\":\"🔴 ${{ github.repository }} — CI Deep / helgrind FAILED. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true

  asan-soak:
    # Flake-repetition soak. The per-PR asan.yml runs the fault-injection suite
    # ONCE; the intermittent shutdown "open socket left in connection" (#12,
    # fixed in #90) and the R6b single-process hang are both ~1-in-4 events, so a
    # single run usually misses them. This loops the SAME sanitized multi-worker
    # binary N times fail-fast (default 8 = the ">=8 clean is proof" bar from the
    # socket-flake hunt), giving the "free repetition" a per-PR run cannot. Kept
    # in ci-deep (monthly + dispatch), never on PR — it is a regression tripwire,
    # not a merge gate. Builds its own ASan binary (ci-deep jobs are
    # self-contained; no cross-workflow artifact reuse).
    name: ASan multi-worker soak (flake repetition)
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 60
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install build and runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache curl eatmydata libpcre2-dev libssl-dev mold redis-server memcached zlib1g-dev

      - name: Build with sanitizers
        run: bash ci/tools/ci-build.sh nginx "$NGINX_VERSION" asan

      - name: Sweep stale test listeners
        run: |
          command -v fuser >/dev/null || sudo apt-get install -y psmisc
          for p in $(seq 18870 18999); do
            fuser -k -TERM "${p}/tcp" 2>/dev/null || true
          done
          sleep 1

      - name: Run multi-worker fault-injection suite N times (fail-fast)
        env:
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=1:abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
          SOAK_ITERATIONS: ${{ github.event.inputs.soak_iterations || 8 }}
        run: |
          B="$GITHUB_WORKSPACE/.build/nginx-${NGINX_VERSION}/objs/nginx"
          n="${SOAK_ITERATIONS}"
          echo "asan-soak: $n iterations of the multi-worker fault-injection suite"
          for i in $(seq 1 "$n"); do
            echo "=== asan-soak iteration $i/$n ==="
            # Sweep between iterations: a crashed run can leave a listener held.
            for p in $(seq 18870 18999); do
              fuser -k -TERM "${p}/tcp" 2>/dev/null || true
            done
            python3 ci/tools/test_runtime.py \
              --fault-injection \
              --sanitizer \
              --redis-server /usr/bin/redis-server \
              --memcached-server /usr/bin/memcached \
              --nginx-binary "$B"
          done
          echo "asan-soak: $n/$n iterations clean"

      - name: Notify Discord on failure
        if: failure() && github.event_name == 'schedule'
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_CHANNEL_BUILDS: ${{ secrets.DISCORD_CHANNEL_BUILDS }}
        run: |
          [ -n "$DISCORD_BOT_TOKEN" ] || exit 0
          curl -fsS -X POST -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_BUILDS/messages" \
            -d "{\"content\":\"🔴 ${{ github.repository }} — CI Deep / asan-soak FAILED. ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true

  scanners:
    name: Security scanners
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 20
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential ccache curl eatmydata flawfinder clang-tidy \
            libpcre2-dev libssl-dev mold python3 python3-pip pipx zlib1g-dev
          # semgrep: isolate via pipx (PEP 668 blocks a bare pip3 install into the
          # system Python on the Ubuntu 24.04 self-hosted runner). Fall back to a
          # user pip install with --break-system-packages if pipx is unavailable.
          if command -v pipx >/dev/null; then
            pipx install --quiet semgrep
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          else
            pip3 install --quiet --user --break-system-packages semgrep
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi
      - name: Configure nginx src tree (clang-tidy headers)
        run: |
          set -euo pipefail
          bash ci/tools/ci-build.sh nginx "$NGINX_VERSION" module
          echo "NGINX_SRC_TREE=$GITHUB_WORKSPACE/.build/nginx-${NGINX_VERSION}" \
            >> "$GITHUB_ENV"
      - name: flawfinder
        run: |
          # minlevel=3: level 1-2 is dominated by token-matches on the struct
          # field op->recv (not the recv(2) syscall) and on FF1029 sites that
          # contain no loop. 34 such alerts were dismissed as false positives.
          flawfinder --minlevel=3 "$GITHUB_WORKSPACE"/src/*.c 2>&1 | tee flawfinder.log
      - name: clang-tidy (cert-*, security.*)
        run: |
          set -euo pipefail
          N="$NGINX_SRC_TREE"
          INCLUDES="-I$N/src/core -I$N/src/event -I$N/src/event/modules -I$N/src/event/quic \
            -I$N/src/os/unix -I$N/objs -I$N/src/http -I$N/src/http/modules -I$N/src/http/v2 -I/usr/include"
          status=0
          for f in "$GITHUB_WORKSPACE"/src/*.c; do
            # shellcheck disable=SC2086
            clang-tidy "$f" \
              --checks='-*,cert-*,clang-analyzer-security.*,-clang-analyzer-security.insecureAPI.DeprecatedOrUnsafeBufferHandling' \
              --warnings-as-errors='*' \
              -- $INCLUDES 2>&1 | tee -a clang-tidy.log || status=1
          done
          exit "$status"
      - name: semgrep
        run: |
          semgrep scan --config p/c --config p/security-audit \
            "$GITHUB_WORKSPACE/src/" 2>&1 | tee semgrep.log || true
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: security-reports
          path: |
            ${{ github.workspace }}/flawfinder.log
            ${{ github.workspace }}/clang-tidy.log
            ${{ github.workspace }}/semgrep.log
          retention-days: 14
