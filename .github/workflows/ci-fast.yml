name: CI Fast

# Fast dynamic analysis on every PR/push — kept short so PR feedback stays
# quick. build-test.yml already does the full build + ASan/UBSan runtime
# matrix; THIS file adds only the two cheap dynamic gates:
#   fuzz-regression : 120s/target on all four parser fuzzers (+dict where useful)
#   memcheck-lite   : 60s valgrind memcheck soak (helgrind is deep-only)
# Long discovery (hours fuzz, full memcheck+helgrind soak, scanners) lives in
# ci-deep.yml (monthly cron + workflow_dispatch).
#
# Action pins (keep in sync with build-test.yml header):
# actions/checkout@v5        -> 93cb6efe18208431cddfb8368fd83d5badbf9bfd
# actions/upload-artifact@v5 -> 330a01c490aca151604b8cf639adc76d48f6c5d4

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: ""

on:
  push:
    branches: [master, main, dev]
  pull_request:
    branches: [master, main]
  workflow_dispatch: {}

concurrency:
  group: ci-fast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz-regression:
    name: Fuzz regression (120s/target)
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 45
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install clang + libFuzzer
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Build fuzz targets
        run: bash fuzz/build.sh "$GITHUB_WORKSPACE/fuzz"

      - name: Run each target 120s
        run: |
          set -euo pipefail
          cd fuzz
          # target:corpus:dict — dict empty where a token dictionary does not help.
          targets="fuzz_resp_parser:corpus:fuzz.dict \
                   fuzz_norm_args:corpus_norm_args: \
                   fuzz_mc_parser:corpus_mc:fuzz_mc.dict \
                   fuzz_auto_classify:corpus_auto:"
          for t in $targets; do
            bin="${t%%:*}"; rest="${t#*:}"; corp="${rest%%:*}"; dict="${rest#*:}"
            echo "=== $bin over $corp (120s)${dict:+ dict=$dict} ==="
            args="-max_total_time=120 -print_final_stats=1 -artifact_prefix=crash-${bin}-"
            [ -n "$dict" ] && args="$args -dict=$dict"
            set +e
            # shellcheck disable=SC2086
            "./$bin" $args "$corp/"
            rc=$?
            set -e
            [ $rc -eq 0 ] || { echo "❌ $bin crash (exit $rc)"; exit 1; }
            echo "✓ $bin: no crashes in 120s"
          done

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-fast-crashes
          path: |
            ${{ github.workspace }}/fuzz/crash-*
          retention-days: 14

  memcheck-lite:
    name: Memcheck lite (60s soak)
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 45
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Resolve latest mainline nginx
        run: |
          set -euo pipefail
          ver=$(curl -fsSL https://nginx.org/en/download.html \
            | grep -oP 'nginx-\K[0-9]+\.[0-9]+\.[0-9]+(?=\.tar\.gz)' \
            | sort -V | tail -1)
          [ -n "$ver" ] || { echo "::error::cannot resolve nginx version"; exit 1; }
          echo "NGINX_VERSION=$ver" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential curl libpcre2-dev libssl-dev pkg-config \
            valgrind wget zlib1g-dev

      - name: Build debug nginx + cache-turbo module
        run: bash tools/ci-build.sh nginx "$NGINX_VERSION" debug

      - name: Memcheck soak (60s @ 4 conc, WITH suppressions)
        env:
          USE_VALGRIND: "1"
        run: |
          B="$GITHUB_WORKSPACE/.build/nginx-${NGINX_VERSION}/objs"
          MODULE="$B/ngx_http_cache_turbo_module.so" \
            bash tools/soak.sh "$B/nginx" 60 4
