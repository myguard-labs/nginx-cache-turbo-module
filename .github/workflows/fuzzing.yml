name: Fuzzing

# Fast fuzz regression gate on every PR/push — 120s/target on all four parser
# fuzzers (+dict where useful), kept short so PR feedback stays quick. Long
# discovery fuzzing (hours/target) lives in ci-deep.yml (monthly cron +
# workflow_dispatch).
#
# Action pins (keep in sync with build-test.yml header):
# actions/checkout@v5        -> 93cb6efe18208431cddfb8368fd83d5badbf9bfd
# actions/upload-artifact@v5 -> 330a01c490aca151604b8cf639adc76d48f6c5d4

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: fuzzing-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fuzz-regression:
    name: Fuzz regression (120s/target)
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-24.04' || fromJSON('["self-hosted","builder02","lxc"]') }}
    timeout-minutes: 45
    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install clang + libFuzzer
        run: |
          sudo apt-get update
          sudo apt-get install -y clang

      - name: Build fuzz targets
        run: bash fuzz/build.sh "$GITHUB_WORKSPACE/fuzz"

      - name: Run each target 120s
        run: |
          set -euo pipefail
          cd fuzz
          # target:corpus:dict — dict empty where a token dictionary does not help.
          targets="fuzz_resp_parser:corpus:fuzz.dict \
                   fuzz_norm_args:corpus_norm_args: \
                   fuzz_mc_parser:corpus_mc:fuzz_mc.dict \
                   fuzz_auto_classify:corpus_auto:"
          for t in $targets; do
            bin="${t%%:*}"; rest="${t#*:}"; corp="${rest%%:*}"; dict="${rest#*:}"
            echo "=== $bin over $corp (120s)${dict:+ dict=$dict} ==="
            args="-max_total_time=120 -print_final_stats=1 -artifact_prefix=crash-${bin}-"
            [ -n "$dict" ] && args="$args -dict=$dict"
            set +e
            # shellcheck disable=SC2086
            "./$bin" $args "$corp/"
            rc=$?
            set -e
            [ $rc -eq 0 ] || { echo "❌ $bin crash (exit $rc)"; exit 1; }
            echo "✓ $bin: no crashes in 120s"
          done

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: fuzz-fast-crashes
          path: |
            ${{ github.workspace }}/fuzz/crash-*
          retention-days: 14
