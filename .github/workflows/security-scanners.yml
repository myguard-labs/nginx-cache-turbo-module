name: Security Scanners

# flawfinder + clang-tidy + semgrep over the C sources, SARIF uploaded to the
# Security tab. Heavy job: monthly on a schedule + manual only. build-test.yml
# carries the fast per-change static checks (cppcheck, clang --analyze, -Wall
# -Wextra -Wshadow -Werror); this adds the deep scanners on a slow cadence.
#
# Third-party actions pinned to commit SHAs (same pins as the other workflows):
# actions/checkout@v5             -> 93cb6efe18208431cddfb8368fd83d5badbf9bfd
# actions/upload-artifact@v5      -> 330a01c490aca151604b8cf639adc76d48f6c5d4
# actions/cache@v4                -> 0057852bfaa89a56745cba8c7296529d2fc39830
# github/codeql-action/upload-sarif@v4 -> 8aad20d150bbac5944a9f9d289da16a4b0d87c1e

on:
  schedule:
    - cron: "17 4 1 * *"
  workflow_dispatch: {}

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  secure:
    name: Secure
    runs-on: [self-hosted, builder02, lxc]
    timeout-minutes: 20
    # CI-2: advisory only. Findings go to the Security tab / artifacts; a scanner
    # hit or an infra hiccup on a PR must never block the merge.
    continue-on-error: true
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout module
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Cache apt packages
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /var/cache/apt/archives
          key: apt-secure-${{ runner.os }}-flawfinder-clang-tidy-nginx-dev
          restore-keys: apt-secure-${{ runner.os }}-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            flawfinder \
            clang-tidy \
            python3 \
            python3-pip \
            nginx-dev

      - name: Cache pip packages (semgrep)
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/pip
          key: pip-semgrep-${{ runner.os }}

      - name: Install semgrep
        run: |
          pip3 install --quiet semgrep
          semgrep --version

      - name: Cache nginx-dev generated headers
        id: nginx-dev-objs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: /usr/share/nginx/src/objs
          key: nginx-dev-objs-${{ runner.os }}-${{ hashFiles('/var/lib/dpkg/info/nginx-dev.list') }}

      - name: Generate nginx build headers (for clang-tidy)
        if: steps.nginx-dev-objs.outputs.cache-hit != 'true'
        run: |
          cd /usr/share/nginx/src
          CC=gcc ./configure --with-compat --add-dynamic-module="$GITHUB_WORKSPACE" > /dev/null 2>&1 || true

      - name: flawfinder (security risk scanner, SARIF)
        run: |
          flawfinder --minlevel=1 --sarif "$GITHUB_WORKSPACE"/src/*.c \
            > flawfinder.sarif 2>/dev/null || true
          flawfinder --minlevel=1 "$GITHUB_WORKSPACE"/src/*.c 2>&1 | tee flawfinder.log
          echo "✓ flawfinder: Scan complete"

      - name: Upload flawfinder SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: flawfinder.sarif
          category: flawfinder
        continue-on-error: true

      - name: clang-tidy (cert-*, bugprone-*, clang-analyzer-security.*)
        run: |
          NGINX_OBJS=/usr/share/nginx/src/objs
          NGINX_INCLUDES=$(dpkg -L nginx-dev 2>/dev/null | grep 'ngx_config.h' | head -1 | xargs dirname || echo /usr/include/nginx)
          INCLUDES="-I$NGINX_INCLUDES -I$NGINX_OBJS -I/usr/include"
          for f in "$GITHUB_WORKSPACE"/src/*.c; do
            echo "--- clang-tidy: $(basename "$f") ---"
            # INCLUDES is a flag list that MUST word-split into individual
            # clang-tidy compiler arguments.
            # shellcheck disable=SC2086
            clang-tidy "$f" \
              --checks='cert-*,clang-analyzer-security.*,clang-analyzer-unix.*,bugprone-*' \
              --warnings-as-errors='' \
              -- $INCLUDES \
              2>&1 || true
          done | tee clang-tidy.log
          echo "✓ clang-tidy: Scan complete"

      - name: semgrep (C rule set — buffer overflows, unsafe fns, integer issues)
        run: |
          semgrep scan \
            --config "p/c" \
            --config "p/security-audit" \
            --sarif --output semgrep.sarif \
            "$GITHUB_WORKSPACE/src/" 2>&1 | tee semgrep.log || true
          echo "✓ semgrep: Scan complete"

      - name: Upload semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep
        continue-on-error: true

      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: security-reports
          path: |
            ${{ github.workspace }}/flawfinder.log
            ${{ github.workspace }}/flawfinder.sarif
            ${{ github.workspace }}/clang-tidy.log
            ${{ github.workspace }}/semgrep.log
            ${{ github.workspace }}/semgrep.sarif
          retention-days: 14
