name: Build and Test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: "1.31.1"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validation:
    name: Validation
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-24.04' || fromJSON('["self-hosted","builder02","lxc"]') }}
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck shellcheck

      - name: Validate scripts and source
        run: |
          bash -n tools/*.sh fuzz/*.sh
          shellcheck tools/*.sh fuzz/*.sh
          python3 -m py_compile tools/test_runtime.py
          python3 tools/lint-ci-runners.py

      - name: Reject corrupt downloaded inputs
        run: |
          tmp=$(mktemp -d)
          trap 'rm -rf "$tmp"' EXIT
          printf corrupt > "$tmp/nginx-1.31.1.tar.gz"
          if bash tools/verify-download.sh "$tmp/nginx-1.31.1.tar.gz"; then
            echo "corrupt nginx archive passed checksum verification" >&2
            exit 1
          fi

      - name: Static analysis (R7 shm-lock invariant + cppcheck + whitespace)
        run: |
          bash tools/lint-shm-lock.sh
          # Scan every source (CI-4): the explicit list previously omitted
          # src/ngx_http_cache_turbo_autotune.c. A glob keeps new sources covered.
          cppcheck \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=normalCheckLevelMaxBranches \
            --suppress=unusedFunction \
            src/*.c
          git diff --check

      - name: Pure-math unit tests (SWR + autotune boundary branches)
        run: |
          # Fast, hermetic, no nginx: compiles the shipped src units verbatim
          # against a shim and drives the fixed-point boundary branches the HTTP
          # runtime suite cannot reach. check_constants.sh guards shim drift.
          bash tests/unit/run.sh

      - name: Lint workflows
        run: |
          version=1.7.7
          archive="/tmp/actionlint_${version}_linux_amd64.tar.gz"
          curl -fsSL -o "$archive" \
            "https://github.com/rhysd/actionlint/releases/download/v${version}/actionlint_${version}_linux_amd64.tar.gz"
          bash tools/verify-download.sh "$archive"
          tar -xzf "$archive" -C /tmp actionlint
          /tmp/actionlint -color .github/workflows/*.yml

  build:
    name: Build
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-24.04' || fromJSON('["self-hosted","builder02","lxc"]') }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang curl libpcre2-dev libssl-dev zlib1g-dev

      # CI-6: full-cache the .build tree (tarball + extracted + configured nginx
      # source). ci-build.sh skips download/extract/configure on a cache hit and
      # goes straight to the module compile; only the module objects rebuild.
      - name: Cache nginx build tree
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .build
          key: nginx-build-${{ env.NGINX_VERSION }}-${{ runner.os }}

      - name: Build server and dynamic module
        run: |
          bash tools/ci-build.sh nginx "$NGINX_VERSION"
          build=".build/nginx-${NGINX_VERSION}/objs"
          test -x "$build/nginx"
          test -f "$build/ngx_http_cache_turbo_module.so"

      - name: No hiredis dependency (native Redis driver)
        run: |
          # cache-turbo's L2 is native nginx upstream; the build must not link
          # hiredis. Guard against a regression that reintroduces it.
          if ldd ".build/nginx-${NGINX_VERSION}/objs/ngx_http_cache_turbo_module.so" \
              2>/dev/null | grep -qi hiredis; then
            echo "module links hiredis; expected native Redis driver" >&2
            exit 1
          fi

      - name: Unit tests — shm node state machine (ASan/UBSan)
        # Runs HERE, not in Validation, because these link nginx's real
        # ngx_rbtree.c and so need the configured tree the build job just made.
        # tests/unit/run.sh SKIPS them when no such tree exists, so this step is
        # what makes them actually execute -- do not remove it on the assumption
        # the Validation job covers it. It does not.
        #
        # Guards CR-A (the L13 negative memo must survive the claim() that stubs
        # its node) and CR-B (unstub() must not free a COUNTER carrying min_uses
        # progress). Both are unreachable through the HTTP surface, so the
        # runtime suite passes with either bug restored -- see tests/unit/
        # ngx_shim_shm.h. Each assertion is control-verified by injecting the
        # bug into the shipped source.
        run: |
          make -C tests/unit --no-print-directory check \
            NGINX_VERSION="$NGINX_VERSION" \
            NGINX_SRC=".build/nginx-${NGINX_VERSION}/src" \
            NGINX_OBJS=".build/nginx-${NGINX_VERSION}/objs"

      - name: Strict module compile
        # CI-1 (compiler axis): the same -Werror wall under BOTH gcc and clang.
        # The two diverge on warnings (clang flags shadow/unreachable/format cases
        # gcc misses and vice-versa), so a clean compile under both is a stronger
        # gate than gcc alone.
        run: |
          build=".build/nginx-${NGINX_VERSION}"
          cflags=$(awk '/^CFLAGS[[:space:]]*=/{sub(/^CFLAGS[[:space:]]*=[[:space:]]*/,""); print; exit}' "$build/objs/Makefile")
          incs=$(awk '/^ALL_INCS[[:space:]]*=/{found=1} found{line=$0; sub(/^ALL_INCS[[:space:]]*=[[:space:]]*/,"",line); continued=(line ~ /\\$/); gsub(/\\$/, "", line); printf "%s ", line; if (!continued) exit}' "$build/objs/Makefile")
          for cc in gcc clang; do
            echo "== strict compile: $cc =="
            for src in ngx_http_cache_turbo_module ngx_http_cache_turbo_shm ngx_http_cache_turbo_swr ngx_http_cache_turbo_autotune ngx_http_cache_turbo_redis ngx_http_cache_turbo_memcached; do
              # cflags and incs are compiler flag lists and must word-split.
              # shellcheck disable=SC2086
              ( cd "$build" && "$cc" -c -fPIC $cflags \
                  -Wall -Wextra -Wshadow -Wstrict-prototypes \
                  -Wstrict-aliasing -Wunreachable-code -Werror \
                  -Wno-unused-parameter \
                  $incs "$GITHUB_WORKSPACE/src/${src}.c" -o "/tmp/${cc}-${src}.o" )
            done
          done

      - name: Stage artifact
        run: |
          mkdir artifact
          cp ".build/nginx-${NGINX_VERSION}/objs/nginx" artifact/
          cp ".build/nginx-${NGINX_VERSION}/objs/ngx_http_cache_turbo_module.so" artifact/

      - name: Upload nginx artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: nginx-mainline
          path: artifact/
          retention-days: 1

  analyze:
    name: Clang static analyzer (per-PR deep analysis)
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-24.04' || fromJSON('["self-hosted","builder02","lxc"]') }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang curl libpcre2-dev libssl-dev zlib1g-dev

      - name: Clang --analyze every source
        # The deep static-analysis suite (security-scanners.yml) only runs monthly;
        # this is a fast clang static-analyzer pass on every PR so a regression
        # cannot merge and sit un-analysed for ~a month. Uses the path-flow
        # analyzer (null-deref, leaks, uninit reads, dead stores) over all six
        # sources with the configured nginx include set. Any report fails the job.
        env:
          NGINX_VERSION: "1.31.1"
        run: |
          bash tools/ci-build.sh nginx "$NGINX_VERSION" module
          build=".build/nginx-${NGINX_VERSION}"
          incs=$(awk '/^ALL_INCS[[:space:]]*=/{found=1} found{line=$0; sub(/^ALL_INCS[[:space:]]*=[[:space:]]*/,"",line); continued=(line ~ /\\$/); gsub(/\\$/, "", line); printf "%s ", line; if (!continued) exit}' "$build/objs/Makefile")
          rc=0
          for src in ngx_http_cache_turbo_module ngx_http_cache_turbo_shm ngx_http_cache_turbo_swr ngx_http_cache_turbo_autotune ngx_http_cache_turbo_redis ngx_http_cache_turbo_memcached; do
            # incs is a flag list and must word-split.
            # shellcheck disable=SC2086
            ( cd "$build" && clang --analyze -Xanalyzer -analyzer-output=text \
                -DNGX_DEBUG_PALLOC=1 $incs \
                "$GITHUB_WORKSPACE/src/${src}.c" 2>"/tmp/analyze-${src}.log" ) || rc=1
            if [ -s "/tmp/analyze-${src}.log" ]; then
              echo "::error file=src/${src}.c::clang analyzer reported issues"
              cat "/tmp/analyze-${src}.log"
              rc=1
            fi
          done
          rm -f "$build"/*.plist
          exit "$rc"

  runtime:
    name: Runtime
    runs-on: ${{ github.event_name == 'pull_request' && 'ubuntu-24.04' || fromJSON('["self-hosted","builder02","lxc"]') }}
    timeout-minutes: 15
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Download nginx artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: nginx-mainline
          path: nginx-bin

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-server memcached

      - name: Sweep stale test listeners
        run: |
          # Kill leftovers from earlier crashed runs still holding test
          # ports (cross-repo collisions on shared runners).
          command -v fuser >/dev/null || sudo apt-get install -y psmisc
          for p in $(seq 18870 18999); do
            fuser -k -TERM "${p}/tcp" 2>/dev/null || true
          done
          sleep 1

      - name: Run runtime suite
        run: |
          chmod +x nginx-bin/nginx
          python3 tools/test_runtime.py \
            --fault-injection \
            --nginx-binary "$GITHUB_WORKSPACE/nginx-bin/nginx" \
            --module "$GITHUB_WORKSPACE/nginx-bin/ngx_http_cache_turbo_module.so" \
            --redis-server /usr/bin/redis-server \
            --memcached-server /usr/bin/memcached

# Legacy nginx (pre-1.23) runtime and ASan+UBSan moved OUT of this workflow
# 2026-07-21:
#   * Legacy pre-1.23 runtime -> ci-deep.yml (nightly). The pre-1.23 cookie-ARRAY
#     ABI branch changes rarely; nightly coverage is sufficient and keeps it off
#     the per-PR critical path.
#   * ASan+UBSan -> dedicated, path-gated asan.yml (compile-once + two parallel
#     suite jobs). Only runs on PRs that touch C sources / the build+runtime
#     harness, and no longer serialises the two suite runs.
