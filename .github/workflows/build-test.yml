name: Build and Test

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: "1.31.1"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 4 * * 1"
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validation:
    name: Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck shellcheck

      - name: Validate scripts and source
        run: |
          bash -n tools/ci-build.sh
          shellcheck tools/ci-build.sh
          python3 -m py_compile tools/test_runtime.py
          cppcheck \
            --enable=warning,performance,portability \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=normalCheckLevelMaxBranches \
            --suppress=unusedFunction \
            src/ngx_http_cache_turbo_module.c \
            src/ngx_http_cache_turbo_shm.c \
            src/ngx_http_cache_turbo_swr.c \
            src/ngx_http_cache_turbo_redis.c
          git diff --check

      - name: Lint workflows
        run: |
          version=1.7.7
          curl -fsSL -o /tmp/actionlint.tgz \
            "https://github.com/rhysd/actionlint/releases/download/v${version}/actionlint_${version}_linux_amd64.tar.gz"
          tar -xzf /tmp/actionlint.tgz -C /tmp actionlint
          /tmp/actionlint -color .github/workflows/*.yml

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl libpcre2-dev libssl-dev zlib1g-dev

      - name: Build server and dynamic module
        run: |
          bash tools/ci-build.sh nginx "$NGINX_VERSION"
          build=".build/nginx-${NGINX_VERSION}/objs"
          test -x "$build/nginx"
          test -f "$build/ngx_http_cache_turbo_module.so"

      - name: No hiredis dependency (native Redis driver)
        run: |
          # cache-turbo's L2 is native nginx upstream; the build must not link
          # hiredis. Guard against a regression that reintroduces it.
          if ldd ".build/nginx-${NGINX_VERSION}/objs/ngx_http_cache_turbo_module.so" \
              2>/dev/null | grep -qi hiredis; then
            echo "module links hiredis; expected native Redis driver" >&2
            exit 1
          fi

      - name: Strict module compile
        run: |
          build=".build/nginx-${NGINX_VERSION}"
          cflags=$(awk '/^CFLAGS[[:space:]]*=/{sub(/^CFLAGS[[:space:]]*=[[:space:]]*/,""); print; exit}' "$build/objs/Makefile")
          incs=$(awk '/^ALL_INCS[[:space:]]*=/{found=1} found{line=$0; sub(/^ALL_INCS[[:space:]]*=[[:space:]]*/,"",line); continued=(line ~ /\\$/); gsub(/\\$/, "", line); printf "%s ", line; if (!continued) exit}' "$build/objs/Makefile")
          # cflags and incs are compiler flag lists and must word-split.
          # shellcheck disable=SC2086
          for src in ngx_http_cache_turbo_module ngx_http_cache_turbo_shm ngx_http_cache_turbo_swr ngx_http_cache_turbo_autotune ngx_http_cache_turbo_redis ngx_http_cache_turbo_memcached; do
            ( cd "$build" && gcc -c -fPIC $cflags \
                -Wall -Wextra -Wshadow -Wstrict-prototypes \
                -Wstrict-aliasing -Wunreachable-code -Werror \
                -Wno-unused-parameter \
                $incs "$GITHUB_WORKSPACE/src/${src}.c" -o "/tmp/${src}.o" )
          done

      - name: Stage artifact
        run: |
          mkdir artifact
          cp ".build/nginx-${NGINX_VERSION}/objs/nginx" artifact/
          cp ".build/nginx-${NGINX_VERSION}/objs/ngx_http_cache_turbo_module.so" artifact/

      - name: Upload nginx artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: nginx-mainline
          path: artifact/
          retention-days: 1

  runtime:
    name: Runtime
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download nginx artifact
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          name: nginx-mainline
          path: nginx-bin

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-server memcached

      - name: Run runtime suite
        run: |
          chmod +x nginx-bin/nginx
          python3 tools/test_runtime.py \
            --nginx-binary "$GITHUB_WORKSPACE/nginx-bin/nginx" \
            --module "$GITHUB_WORKSPACE/nginx-bin/ngx_http_cache_turbo_module.so" \
            --redis-server /usr/bin/redis-server \
            --memcached-server /usr/bin/memcached

  asan:
    name: ASan and UBSan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl libpcre2-dev libssl-dev redis-server memcached zlib1g-dev

      - name: Build with sanitizers
        run: bash tools/ci-build.sh nginx "$NGINX_VERSION" asan

      - name: Run runtime suite under ASan and UBSan
        env:
          ASAN_OPTIONS: detect_leaks=0:halt_on_error=1:abort_on_error=1
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: |
          python3 tools/test_runtime.py \
            --single-process \
            --redis-server /usr/bin/redis-server \
            --memcached-server /usr/bin/memcached \
            --nginx-binary "$GITHUB_WORKSPACE/.build/nginx-${NGINX_VERSION}/objs/nginx"
