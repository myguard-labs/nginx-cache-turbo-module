name: CodeQL

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NGINX_VERSION: "1.31.1"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "47 4 5 * *"
  workflow_dispatch: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze C
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Install build dependencies
        run: |
          sudo apt-get update
          # No ccache here: CodeQL's build tracer must see every compiler
          # invocation; a ccache hit skips the compile and hides code from the
          # database. mold/eatmydata are link/IO-only and safe.
          sudo apt-get install -y build-essential curl eatmydata libpcre2-dev libssl-dev mold zlib1g-dev

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: c-cpp
          queries: security-extended
          config: |
            paths:
              - src
            paths-ignore:
              - .build/**

      - name: Build traced source
        run: bash ci/tools/ci-build.sh nginx "$NGINX_VERSION" module

      - name: Analyze
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: /language:c-cpp
