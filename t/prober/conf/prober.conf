# Server layout the prober rules assume. Loaded by t/prober/run.sh, which
# substitutes @MODULE@ and @PORT@ via the harness.
#
# Zero-hook layout: one cache_turbo zone, one location that runs the module's
# whole request path against a dead upstream (127.0.0.1:1 -- nothing listens
# there, so a MISS surfaces as 502 and nothing gets stored), one location the
# module does not touch at all, and the probe endpoint. The rules assert only
# on the harness's generic document -- fds, cycle pool, slab pages, pid --
# because cache-turbo registers neither probe hook.

@LOAD@

daemon off;
master_process on;

# REQUIRED by the harness pid oracle: with several workers consecutive probes
# are answered by different processes and every case fails on a healthy server.
worker_processes 1;

error_log logs/error.log info;
pid       logs/nginx.pid;

events {
    worker_connections 64;
}

http {
    access_log off;

    # min size is 8 pages; 1m keeps slab accounting readable in the probe
    cache_turbo_zone name=probezone 1m;

    server {
        listen 127.0.0.1:@PORT@;
        server_name prober;

        # The module's full miss path: key derivation, zone lookup under the
        # slab mutex, upstream fetch, body-filter capture attempt. The dead
        # upstream turns every request into a 502, which cache-turbo must not
        # store -- so the slab accounting must not move either.
        location /cached {
            cache_turbo       probezone;
            cache_turbo_valid 60s;
            proxy_pass http://127.0.0.1:1;
        }

        # Same dead upstream, module off: the baseline the delta rules use to
        # tell "the module leaks" from "the core leaks".
        location /uncached {
            cache_turbo off;
            proxy_pass http://127.0.0.1:1;
        }

        location /__probe {
            cache_turbo_probe probezone;
        }
    }
}
